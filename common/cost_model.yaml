# ==============================================================================
# WE-MEET: 노드 유형별 성능 격리 스펙 및 가상 요금 모델 (cost_model.yaml)
# ==============================================================================

nodes:
  on_demand:
    cpu_limit: 2.0
    memory_limit_mb: 2048
    cost_per_hour: 0.710  # AWS g4dn.xlarge 서울 리전 온디맨드 표준 단가 기준 ($0.71/Hour)
    gpu_scale_factor: 1.0
    preemption_probability: 0.0
  spot_a:
    cpu_limit: 1.0
    memory_limit_mb: 1024
    cost_per_hour: 0.220   # AWS g4dn.xlarge 스팟 요금에 자원 격리(1/2) 할인을 반영한 단가 ($0.22/Hour)
    gpu_scale_factor: 0.6
    preemption_probability: 0.3
  spot_b:
    cpu_limit: 0.5
    memory_limit_mb: 512
    cost_per_hour: 0.090   # AWS g4dn.xlarge 스팟 요금에 자원 격리(1/4) 할인을 반영한 단가 ($0.09/Hour)
    gpu_scale_factor: 0.3
    preemption_probability: 0.7

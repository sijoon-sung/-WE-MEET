version: '3.8'

networks:
  babyray-net:
    driver: bridge

volumes:
  babyray-data: # 워커 가중치 공유 볼륨

services:
  # GCS 및 Q-learning 스케줄러를 구동하는 Head 관리 노드
  head:
    build:
      context: ..
      dockerfile: docker/Dockerfile.head
    image: babyray-head-image:latest
    container_name: babyray-head
    command: python -m head.head
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # 호스트 Docker 데몬 연동
      - babyray-data:/app/data # 공유 데이터 폴더 마운트
    ports:
      - "50051:50051" # gRPC 포트
      - "8080:8080" # 모니터링 대시보드 포트 추가
    networks:
      - babyray-net
    environment:
      - NODE_TYPE=head
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # On-Demand 노드 (2 Cores, 2GB Memory, GPU 1.0 배율)
  worker-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    image: babyray-worker-image:latest
    container_name: babyray-worker-1
    depends_on:
      - head
    command: python -m worker.worker --id worker-1 --type on_demand --port 50052
    volumes:
      - babyray-data:/app/data # 공유 데이터 폴더 마운트
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - babyray-net
    environment:
      - NODE_TYPE=on_demand
      - HEAD_HOST=head
      - HEAD_PORT=50051
      - PYTHONUNBUFFERED=1

